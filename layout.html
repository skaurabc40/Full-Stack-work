<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0px;
        padding: 0px;
    }
    .clear-box
    {
        clear: both;
    }
    .container{
        width: 1000px;
        height: 400px;
        margin: 50px auto 0;
        border: 5px solid #000;
        padding: 10px;
        box-sizing: border-box;
    }
    .box1{
         width: 100px;
        height: 50px;
        border: 5px solid;
        margin: 5px;
        float: left;
        box-shadow: 2px 2px 5px;
    }
    .shadow{
         box-shadow: 2px 2px 5px;
    }
    .box2{
         width: 100px;
        height: 50px;
        border: 5px solid #000;
        margin-left: 300px;
        float: left;
    }
    .box3{
         width: 100px;
        height: 50px;
        border: 5px solid;
        float: right;
    }
     .Mid{
         width: auto;
        height: 100px;
        border: 5px solid;
        margin-top: 120px;
        padding:10px;
        box-sizing: border-box;
    }
     .box4{
         width: 100px;
        height: 50px;
        border: 5px solid;
        margin-top: 60px;
        float: left;
        
    }
     .box5{
         width: 100px;
        height: 50px;
        border: 5px solid;
        margin-left: 315px;
        float: left;
         margin-top: 60px;
    }
     .box6{
         width: 100px;
        height: 50px;
        border: 5px solid;
        margin: 5px;
        float: right;
         margin-top: 60px;
    }
    .box-m1{
        width: 450px;
        height: 50px;
        border: 5px solid;
        float:left;
        border-radius: 10px;
    }
    .box-m2{
        width: 450px;
        height: 50px;
        border: 5px solid;
        float:right;
        border-radius: 10px;
    }
</style>
<body>
    <div class="container shadow">
    <div class="box1 shadow"></div>
    <div class="box2 shadow"></div>
    <div class="box3 shadow"></div>
      <br class="clear"/>
    <div class="Mid shadow">
        <div class="box-m1"></div>
        <div class="box-m2 "></div>
    </div>
    <div class="box4 shadow"></div>
    <div class="box5 shadow"></div>
    <div class="box6 shadow"></div>
     <br class="clear"/>
</div>
    
</body>
</html>
